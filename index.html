<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti Anya 💛</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Texto */
#mensaje {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 24px;
    color: white;
    font-family: Arial;
}

/* Indicador */
#toca {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: #ffff00;
    font-size: 16px;
    opacity: 0.8;
}

/* Flores */
.flower {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
}

/* Caer */
@keyframes caer {
    0% {
        transform: translateY(-10vh);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh);
        opacity: 0;
    }
}

/* Subir */
@keyframes subir {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-120vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1 id="mensaje"></h1>
<div id="toca">Toca la pantalla para activar la música 💛</div>

<!-- 🎵 Música -->
<audio id="musica" loop autoplay muted>
  <source src="audio.mp3.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 Música desde segundo 50
const musica = document.getElementById("musica");

// Intentar iniciar desde 50
musica.addEventListener("loadedmetadata", () => {
    musica.currentTime = 50;
});

// Activar sonido al tocar
document.body.addEventListener("click", () => {
    musica.muted = false;
    musica.currentTime = 50;
    musica.play();
    document.getElementById("toca").style.display = "none";
}, { once: true });

// 💛 Texto animado
const texto = "Más hermosa que las flores eres tú mi niña, te quiero 💛";
let i = 0;

function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 50);
    }
}
escribir();

// 🌼 Flores amarillas
const flores = ["🌼", "🌻"];

function crearFlor() {
    const flor = document.createElement("div");
    flor.className = "flower";

    flor.style.left = Math.random() * 100 + "vw";

    const duracion = (Math.random() * 3 + 3);
    flor.style.animationDuration = duracion + "s";

    flor.innerHTML = flores[Math.floor(Math.random() * flores.length)];

    if (Math.random() > 0.5) {
        flor.style.top = "-10vh";
        flor.style.animation = "caer " + duracion + "s linear";
    } else {
        flor.style.top = "110vh";
        flor.style.animation = "subir " + duracion + "s linear";
    }

    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, duracion * 1000);
}

setInterval(crearFlor, 300);
</script>

</body>
</html>
