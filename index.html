<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💛</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
}

/* Estrellas */
.particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: yellow;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-100px); }
    100% { transform: translateY(100vh); }
}

/* Texto */
#mensaje {
    position: absolute;
    top: 50%;
    width: 100%;
    text-align: center;
    font-size: 22px;
    transform: translateY(-50%);
    padding: 20px;
}
</style>
</head>

<body>

<h1 id="mensaje"></h1>

<script>
// TEXTO
const texto = "Más hermosa que las flores eres tú, mi niña. Te quiero, ¿viste? No se me olvidó ❤️";

let i = 0;
function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 50);
    }
}
escribir();

// PARTÍCULAS
function crearParticula() {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(p);

    setTimeout(() => {
        p.remove();
    }, 5000);
}

setInterval(crearParticula, 100);
</script>

</body>
</html>
