<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti Anya 💛</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#mensaje {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 24px;
    color: white;
}

#toca {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
    color: yellow;
}

.flower {
    position: absolute;
    font-size: 24px;
}

@keyframes caer {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}

@keyframes subir {
    0% { transform: translateY(0); }
    100% { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<h1 id="mensaje"></h1>
<div id="toca">Toca la pantalla para escuchar 💛</div>

<!-- 🎵 MÚSICA DESDE SEGUNDO 48 -->
<iframe 
id="musicaYT"
src="https://www.youtube.com/embed/cFkim468SVg?start=48&autoplay=1&loop=1&playlist=cFkim468SVg&mute=1"
allow="autoplay"
style="width:0;height:0;border:0;">
</iframe>

<script>
// Activar música con sonido
document.body.addEventListener("click", () => {
    const iframe = document.getElementById("musicaYT");
    iframe.src = "https://www.youtube.com/embed/cFkim468SVg?start=48&autoplay=1&loop=1&playlist=cFkim468SVg";
    document.getElementById("toca").style.display = "none";
}, { once: true });

// Texto animado
const texto = "Más hermosa que las flores eres tú mi niña, te quiero 💛 por si no te las dieron yo te las doy estas flores para que no seas espectadora💛";
let i = 0;

function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 50);
    }
}
escribir();

// Flores animadas
const flores = ["🌼","🌻"];

function crearFlor() {
    const flor = document.createElement("div");
    flor.className = "flower";

    flor.style.left = Math.random() * 100 + "vw";

    const duracion = Math.random() * 3 + 3;

    if (Math.random() > 0.5) {
        flor.style.top = "-10vh";
        flor.style.animation = "caer " + duracion + "s linear";
    } else {
        flor.style.top = "110vh";
        flor.style.animation = "subir " + duracion + "s linear";
    }

    flor.innerHTML = flores[Math.floor(Math.random() * flores.length)];

    document.body.appendChild(flor);

    setTimeout(() => flor.remove(), duracion * 1000);
}

setInterval(crearFlor, 300);
</script>

</body>
</html>
