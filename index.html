<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti Anya 💛</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    position: absolute;
    top: 20%;
    width: 100%;
    font-size: 24px;
    animation: fadeIn 3s ease forwards;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* Flores */
.flower {
    position: absolute;
    bottom: 0;
    width: 10px;
    height: 100px;
    background: green;
    left: 50%;
    transform: translateX(-50%);
}

.petal {
    position: absolute;
    width: 30px;
    height: 30px;
    background: yellow;
    border-radius: 50%;
}

.p1 { top: -20px; left: -15px; }
.p2 { top: -20px; right: -15px; }
.p3 { top: -40px; left: 0; }

/* Partículas */
.particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: yellow;
    border-radius: 50%;
    animation: fall linear infinite;
}

@keyframes fall {
    from { transform: translateY(-100px); }
    to { transform: translateY(100vh); }
}
</style>

</head>

<body>

<h1 id="mensaje"></h1>

<div class="flower">
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
</div>

<script>
const texto = Más hermosa que las flores eres tú mi niña, te quiero, ¿viste? no se me olvidó ❤️
let i = 0;

function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 50);
    }
}
escribir();

// partículas
function crearParticula() {
    const p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random() * window.innerWidth + "px";
    p.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(p);

    setTimeout(() => {
        p.remove();
    }, 5000);
}

setInterval(crearParticula, 100);
</script>

</body>
</html>
