<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti Anya 💛</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Flores */
.flower {
    position: absolute;
    bottom: 0;
    animation: subir 6s linear infinite;
    font-size: 30px;
}

@keyframes subir {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* Texto */
h1 {
    position: absolute;
    color: white;
    text-align: center;
    top: 40%;
    width: 100%;
    font-size: 22px;
    font-family: Arial;
    animation: aparecer 3s ease;
}

@keyframes aparecer {
    from { opacity: 0; }
    to { opacity: 1; }
}
</style>
</head>

<body>

<h1 id="mensaje"></h1>

<audio autoplay loop>
    <source src="https://www.myinstants.com/media/sounds/romantic.mp3" type="audio/mpeg">
</audio>

<script>
const texto = "Más hermosa que las flores eres tú mi niña, te quiero ❤️";
let i = 0;

function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 50);
    }
}
escribir();

/* Generar flores */
function crearFlor() {
    const flor = document.createElement("div");
    flor.className = "flower";
    flor.style.left = Math.random() * 100 + "vw";
    flor.innerHTML = "🌸";
    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, 6000);
}

setInterval(crearFlor, 300);
</script>

</body>
</html>
