<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti Anya 💛</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Texto */
#mensaje {
    position: absolute;
    top: 20%;
    width: 100%;
    text-align: center;
    font-size: 24px;
    color: white;
    font-family: Arial;
}

/* Flores */
.flower {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
}

/* Caer (desde arriba) */
@keyframes caer {
    0% {
        transform: translateY(-10vh);
        opacity: 1;
    }
    100% {
        transform: translateY(110vh);
        opacity: 0;
    }
}

/* Subir (desde abajo) */
@keyframes subir {
    0% {
        transform: translateY(0);
        opacity: 1;
    }
    100% {
        transform: translateY(-120vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1 id="mensaje"></h1>

<audio id="musica" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
// 🎵 Música (requiere clic)
const musica = document.getElementById("musica");
document.body.addEventListener("click", () => {
    musica.play();
}, { once: true });

// 💛 Texto animado
const texto = "Más hermosa que las flores eres tú mi niña, te quiero 💛";
let i = 0;

function escribir() {
    if (i < texto.length) {
        document.getElementById("mensaje").innerHTML += texto.charAt(i);
        i++;
        setTimeout(escribir, 50);
    }
}
escribir();

// 🌼 FLORES AMARILLAS
const flores = ["🌼", "🌻"];

function crearFlor() {
    const flor = document.createElement("div");
    flor.className = "flower";

    // Posición horizontal
    flor.style.left = Math.random() * 100 + "vw";

    // Duración
    const duracion = (Math.random() * 3 + 3);
    flor.style.animationDuration = duracion + "s";

    // Elegir flor
    flor.innerHTML = flores[Math.floor(Math.random() * flores.length)];

    // 🔥 Desde arriba o desde abajo
    if (Math.random() > 0.5) {
        // Desde arriba
        flor.style.top = "-10vh";
        flor.style.animation = "caer " + duracion + "s linear";
    } else {
        // Desde abajo
        flor.style.top = "110vh";
        flor.style.animation = "subir " + duracion + "s linear";
    }

    document.body.appendChild(flor);

    setTimeout(() => {
        flor.remove();
    }, duracion * 1000);
}

// Generar flores constantemente
setInterval(crearFlor, 300);
</script>

</body>
</html>
